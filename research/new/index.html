<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Khashif Research · new topic</title>
<meta name="description" content="Start a new Khashif Topic Research run — input topic + goal + known sources, 5 role-specialized boost cycles produce a report + network map.">
<meta name="theme-color" content="#060f0a">
<meta name="robots" content="noindex,nofollow">
<link rel="canonical" href="https://khashif.run/research/new/">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23060f0a'/%3E%3Ccircle cx='16' cy='16' r='5' fill='%2346b06b'/%3E%3Ccircle cx='16' cy='16' r='10' fill='none' stroke='%236fe49b' stroke-width='1' opacity='0.5'/%3E%3C/svg%3E">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #060f0a; color: #d6e8dc; font-family: monospace;
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .panel {
    background: rgba(14,32,22,0.85); backdrop-filter: blur(6px);
    border: 0.5px solid rgba(70,176,107,0.3); border-radius: 10px;
    padding: 36px 40px; max-width: 640px; width: 100%;
    box-shadow: 0 0 40px rgba(70,176,107,0.08);
  }
  h1 {
    color: #6fe49b; font-size: 14px; letter-spacing: 0.18em;
    text-transform: uppercase; margin-bottom: 6px;
  }
  .sub {
    color: rgba(189,242,208,0.55); font-size: 11px; line-height: 1.65;
    margin-bottom: 28px;
  }
  label {
    display: block; color: #6fe49b; font-size: 10px;
    letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 6px;
    margin-top: 18px;
  }
  .hint {
    color: rgba(189,242,208,0.4); font-size: 10px; font-weight: normal;
    text-transform: none; letter-spacing: 0; margin-left: 6px;
  }
  input[type="text"], textarea {
    width: 100%; background: #060f0a; color: #d6e8dc;
    border: 0.5px solid #2f6b45; border-radius: 4px;
    padding: 10px 12px; font-family: monospace; font-size: 12px;
    line-height: 1.55;
  }
  input[type="text"]:focus, textarea:focus { outline: none; border-color: #46b06b; }
  textarea { resize: vertical; min-height: 72px; }
  .actions { margin-top: 28px; display: flex; gap: 12px; align-items: center; }
  button {
    background: #2f6b45; color: #d6e8dc;
    padding: 10px 22px; border-radius: 5px; border: none; cursor: pointer;
    font-family: monospace; font-size: 11px; letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  button:hover { background: #46b06b; color: #060f0a; }
  button.go { background: #ff8030; color: #060f0a; }
  button.go:hover { background: #ffaa66; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .nav { font-size: 10px; color: rgba(70,176,107,0.7); }
  .nav a { color: rgba(70,176,107,0.85); text-decoration: none; }
  .nav a:hover { color: #6fe49b; }
  #status { margin-top: 18px; font-size: 11px; color: #ff8030; min-height: 14px; }
  #status.ok { color: #6fe49b; }
</style>
</head>
<body>
  <div class="panel">
    <h1>Khashif · Topic Research · new</h1>
    <div class="sub">
      5 role-specialized boost cycles. Output: report + network map.<br>
      cycle 1 keşif · 2-3 deep dive · 4 intersection · 5 final report.
    </div>

    <form id="form">
      <label>topic <span class="hint">subject of the research</span></label>
      <input type="text" id="topic" required maxlength="200" placeholder="e.g. Cyprus RIF PRE-SEED grant landscape">

      <label>goal <span class="hint">what should this research enable</span></label>
      <textarea id="goal" required maxlength="500" placeholder="e.g. eligibility map + reuse strategy + ecosystem partner map for RIF PRE-SEED application"></textarea>

      <label>sources <span class="hint">known starting points, comma-separated — optional</span></label>
      <textarea id="sources" maxlength="1000" placeholder="https://research.org.cy, https://...
"></textarea>

      <div class="actions">
        <button type="submit" class="go" id="submit">Create &amp; Begin →</button>
        <span class="nav"><a href="/operator/">← operator room</a></span>
      </div>
      <div id="status"></div>
    </form>
  </div>

<script>
const form = document.getElementById('form');
const status = document.getElementById('status');
const btn = document.getElementById('submit');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const topic = document.getElementById('topic').value.trim();
  const goal = document.getElementById('goal').value.trim();
  const sourcesRaw = document.getElementById('sources').value.trim();
  const sources = sourcesRaw
    ? sourcesRaw.split(/[,\n]+/).map(s => s.trim()).filter(Boolean)
    : [];

  if (!topic || topic.length < 3) { status.textContent = 'topic must be at least 3 characters.'; return; }
  if (!goal || goal.length < 3) { status.textContent = 'goal must be at least 3 characters.'; return; }

  btn.disabled = true;
  status.classList.remove('ok');
  status.textContent = 'creating topic partition…';
  try {
    const res = await fetch('/api/research', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Khashif-Key': 'khashif2026' },
      body: JSON.stringify({ topic, goal, sources }),
    });
    const data = await res.json();
    if (!res.ok) {
      status.textContent = 'error: ' + (data.error || res.status);
      btn.disabled = false; return;
    }
    status.classList.add('ok');
    status.textContent = 'created · slug: ' + data.slug + ' — opening console…';
    setTimeout(() => { window.location = '/research/?slug=' + encodeURIComponent(data.slug); }, 600);
  } catch (err) {
    status.textContent = 'fetch failed: ' + err.message;
    btn.disabled = false;
  }
});
</script>
</body>
</html>
